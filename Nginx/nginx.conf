worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  client_body_temp_path /tmp/nginxclient;
  proxy_temp_path /tmp/nginxproxy;
  fastcgi_temp_path /tmp/nginxfastcgi;
  uwsgi_temp_path /tmp/nginxuwsgi;
  scgi_temp_path /tmp/nginxscgi;

  client_max_body_size 2m;
  client_body_buffer_size 64k;
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 20s;
  send_timeout 15s;
  large_client_header_buffers 4 8k;
  reset_timedout_connection on;

  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header CF-Connecting-IP;
  real_ip_recursive on;

  map $http_x_forwarded_proto $ProtocoloOriginal {
    default $scheme;
    http http;
    https https;
  }

  map $http_x_forwarded_proto $RedirigirHttps {
    default 0;
    http 1;
  }

  limit_req_zone $binary_remote_addr zone=General:10m rate=15r/s;
  limit_req_zone $binary_remote_addr zone=Acceso:10m rate=3r/m;
  limit_conn_zone $binary_remote_addr zone=Conexiones:10m;
  limit_req_status 429;
  limit_conn_status 429;

  proxy_hide_header Content-Security-Policy;
  proxy_hide_header Strict-Transport-Security;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header Permissions-Policy;
  proxy_hide_header Cross-Origin-Opener-Policy;
  proxy_hide_header Cross-Origin-Resource-Policy;
  proxy_hide_header X-Permitted-Cross-Domain-Policies;

  log_format seguro '$remote_addr - $request_method $uri $status $body_bytes_sent';
  access_log /dev/stdout seguro;
  error_log /dev/stderr warn;

  upstream Aplicacion {
    server aplicacion:8080;
    keepalive 16;
  }

  upstream Servidor {
    server servidor:3000;
    keepalive 16;
  }

  server {
    listen 8080;
    server_name _;
    limit_conn Conexiones 25;
    limit_req zone=General burst=30 nodelay;

    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'none'; media-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    if ($RedirigirHttps = 1) {
      return 301 https://$host$request_uri;
    }

    if ($request_method = TRACE) {
      return 405;
    }

    if ($request_method = CONNECT) {
      return 405;
    }

    location = /api/acceso {
      limit_req zone=Acceso burst=2 nodelay;
      proxy_pass http://Servidor;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $ProtocoloOriginal;
      proxy_connect_timeout 3s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
    }

    location /api/ {
      proxy_pass http://Servidor;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $ProtocoloOriginal;
      proxy_connect_timeout 3s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
    }

    location / {
      proxy_pass http://Aplicacion;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $ProtocoloOriginal;
      proxy_connect_timeout 3s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
    }

    location ~ (^|/)\. {
      deny all;
    }
  }
}