server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|svg|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  location ~ (^|/)\. {
    deny all;
  }
}